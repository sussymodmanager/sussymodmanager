name: SUSSYMODMANAGER Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [[ "$REF" == v* ]]; then
            echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        shell: bash
        run: |
          # NOTE: intentionally NOT using PublishSingleFile. A self-extracting single-file .NET
          # binary is a common Windows Defender false-positive trigger (Wacatac et al.). A plain
          # self-contained folder is far less likely to be flagged.
          dotnet publish src/SussyModManager/SussyModManager.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:Version=${{ steps.ver.outputs.version }} \
            -o publish/${{ matrix.rid }}

      - name: Package (zip)
        shell: bash
        env:
          RID: ${{ matrix.rid }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          ZIP="SussyModManager-${RID}.zip"

          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: wrap the self-contained folder in a named directory so users get one tidy
            # folder (run SussyModManager.exe inside it) instead of ~150 loose files.
            OUT="dist/SussyModManager-${RID}"
            mkdir -p "${OUT}"
            cp -R publish/${RID}/. "${OUT}/"
            (cd dist && 7z a "../${ZIP}" "SussyModManager-${RID}")

          elif [ "${{ runner.os }}" = "macOS" ]; then
            # macOS: assemble a proper .app bundle.
            APP="dist/SussyModManager.app"
            mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"
            cp -R publish/${RID}/. "${APP}/Contents/MacOS/"
            cp src/SussyModManager/Assets/sus.icns "${APP}/Contents/Resources/sus.icns"
            sed "s/__VERSION__/${VERSION}/g" packaging/macos/Info.plist > "${APP}/Contents/Info.plist"
            chmod +x "${APP}/Contents/MacOS/SussyModManager"
            (cd dist && zip -r -y "../${ZIP}" "SussyModManager.app")

          else
            # Linux: binary + launcher + .desktop + icon in a single folder.
            OUT="dist/SussyModManager-${RID}"
            mkdir -p "${OUT}"
            cp -R publish/${RID}/. "${OUT}/"
            cp packaging/linux/run.sh "${OUT}/run.sh"
            cp packaging/linux/sussymodmanager.desktop "${OUT}/sussymodmanager.desktop"
            cp src/SussyModManager/Assets/sus-256.png "${OUT}/sussymodmanager.png"
            chmod +x "${OUT}/SussyModManager" "${OUT}/run.sh"
            (cd dist && zip -r "../${ZIP}" "SussyModManager-${RID}")
          fi

      - name: Build Windows installer (Inno Setup)
        if: matrix.rid == 'win-x64'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          choco install innosetup -y --no-progress
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          # Double slash so MSYS/Git-Bash doesn't mangle the /D define flag into a path.
          "$ISCC" "//DMyAppVersion=${VERSION}" packaging/windows/SussyModManager.iss
          ls -la installer

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SussyModManager-${{ matrix.rid }}
          path: SussyModManager-${{ matrix.rid }}.zip

      - name: Upload installer artifact
        if: matrix.rid == 'win-x64'
        uses: actions/upload-artifact@v4
        with:
          name: SussyModManager-Setup-x64
          path: installer/SussyModManager-Setup-x64.exe

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
          generate_release_notes: true
